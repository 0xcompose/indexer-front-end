server {
	listen 80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	gzip on;
	gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

	# Same-origin JSON-RPC to token-api (browser → frontend origin → token-api:8080/rpc)
	location = /__token-metadata__ {
		proxy_pass http://token-api:8080/rpc;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location / {
		try_files $uri $uri/ /index.html;
	}
}

